apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trip-canvas-staging

resources:
  - ../../base
  - namespace.yaml
  - configmap.yaml
  - ingress.yaml

images:
  - name: ghcr.io/seonwook61/travlecanvas
    newTag: 0f13a4b

patches:
  - target:
      kind: Deployment
      name: trip-canvas
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-credentials
