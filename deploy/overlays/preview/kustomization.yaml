apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - configmap.yaml

images:
  - name: ghcr.io/seonwook61/travlecanvas
    newTag: preview-placeholder

patches:
  - target:
      kind: Deployment
      name: trip-canvas
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-credentials
