apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-canvas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip-canvas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip-canvas
    spec:
      containers:
        - name: web
          image: ghcr.io/seonwook61/travlecanvas:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: trip-canvas-env
            - secretRef:
                name: trip-canvas-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
